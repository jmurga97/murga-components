name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.6

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify tag
        run: |
          PACKAGE_VERSION="$(bun -e 'console.log(require("./package.json").version)')"
          test "${GITHUB_REF_NAME}" = "v${PACKAGE_VERSION}"

      - name: Validate package
        run: |
          bun run lint
          bun run check
          bun run package:check
          bun run build:cdn

      - name: Publish npm package
        run: bun publish --access public
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Deploy CDN Worker
        run: bun run worker:deploy
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Publish versioned CDN assets
        run: bun run cdn:publish
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Smoke test CDN
        run: |
          VERSION="$(bun -e 'console.log(require("./package.json").version)')"
          curl --fail --retry 8 --retry-all-errors --retry-delay 5 \
            "https://cdn.murga.ing/v/${VERSION}/manifest.json"
          curl --fail --retry 8 --retry-all-errors --retry-delay 5 \
            --head "https://cdn.murga.ing/latest/murga-components.js"
